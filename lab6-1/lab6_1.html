<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>if-else if & switch-case</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen py-10 px-4 flex items-start justify-center">

    <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-md border border-gray-200">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4 text-center">ระบบแปลงหน่วย (Converter)</h2>
        
        <form onsubmit="event.preventDefault(); convertUnit();" class="space-y-5">
            
            <div>
                <label for="inputValue" class="block text-sm font-medium text-gray-700 mb-1">ระบุตัวเลขที่ต้องการแปลง</label>
                <input type="number" id="inputValue" required step="any" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="เช่น 100">
            </div>

            <div>
                <label for="convertType" class="block text-sm font-medium text-gray-700 mb-1">เลือกประเภทการแปลง</label>
                <select id="convertType" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white">
                    <option value="kg_to_lbs">กิโลกรัม เป็น ปอนด์ (Kg -> Lbs)</option>
                    <option value="c_to_f">เซลเซียส เป็น ฟาเรนไฮต์ (°C -> °F)</option>
                    <option value="km_to_miles">กิโลเมตร เป็น ไมล์ (Km -> Miles)</option>
                </select>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md">
                คำนวณการแปลงหน่วย
            </button>
        </form>

        <div id="resultContainer" class="mt-6 pt-6 border-t-2 border-gray-100 hidden text-center animate-fade-in">
            <p class="text-gray-500 text-sm mb-2">ผลลัพธ์:</p>
            <div id="displayResult" class="text-xl font-bold text-indigo-700 bg-indigo-50 py-4 px-2 rounded-lg border border-indigo-100">
                </div>
        </div>

    </div>

    <script>
        function convertUnit() {
            let inputValue = parseFloat(document.getElementById('inputValue').value);
            let convertType = document.getElementById('convertType').value;
            let result = 0;
            let resultText = "";

            switch (convertType) {
                case 'kg_to_lbs':
                    result = inputValue * 2.20462;
                    resultText = `${inputValue} กิโลกรัม = ${result.toFixed(2)} ปอนด์`;
                    break;
                    
                case 'c_to_f':
                    result = (inputValue * 9/5) + 32;
                    resultText = `${inputValue} °C = ${result.toFixed(2)} °F`;
                    break;
                    
                case 'km_to_miles':
                    result = inputValue * 0.621371;
                    resultText = `${inputValue} กิโลเมตร = ${result.toFixed(2)} ไมล์`;
                    break;
                    
                default:
                    resultText = "ไม่พบประเภทการแปลงหน่วยที่เลือก";
            }

                document.getElementById('resultContainer').classList.remove('hidden');
                document.getElementById('displayResult').innerText = resultText;
        }
    </script>
</body>
</html>
