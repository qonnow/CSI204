<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฟอร์มคำนวณค่าไฟฟ้าภายในบ้าน</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen py-10 px-4">

    <div class="max-w-2xl mx-auto space-y-6">
        
        <div class="bg-white p-8 rounded-xl shadow-md border border-gray-200">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4 text-center">คำนวณค่าไฟฟ้าภายในบ้าน</h2>
            
            <form onsubmit="event.preventDefault(); calculateElectricity();" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="prevUnit" class="block text-sm font-medium text-gray-700 mb-1">เลขจดมิเตอร์เดือนก่อน (หน่วย)</label>
                    <input type="number" id="prevUnit" required min="0" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500 focus:outline-none" placeholder="เช่น 1200">
                </div>

                <div>
                    <label for="currentUnit" class="block text-sm font-medium text-gray-700 mb-1">เลขจดมิเตอร์เดือนนี้ (หน่วย)</label>
                    <input type="number" id="currentUnit" required min="0" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500 focus:outline-none" placeholder="เช่น 1550">
                </div>

                <div class="md:col-span-2">
                    <label for="ftRate" class="block text-sm font-medium text-gray-700 mb-1">ค่า Ft (บาท/หน่วย)</label>
                    <input type="number" id="ftRate" required step="0.01" value="0.65" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500 focus:outline-none bg-gray-50">
                    <p class="text-xs text-gray-500 mt-1">* ค่า Ft เปลี่ยนแปลงตามประกาศของการไฟฟ้า (ตัวอย่าง: 0.65 บาท)</p>
                </div>

                <div class="md:col-span-2 mt-2">
                    <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md">
                        submit
                    </button>
                </div>
            </form>
        </div>

        <div id="resultContainer" class="bg-white p-8 rounded-xl shadow-md border border-gray-200 hidden">
            <h3 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">สรุปค่าไฟฟ้า</h3>
            
            <div id="billDetails" class="space-y-3 text-gray-700">
                </div>
        </div>

    </div>

    <script>
        function calculateElectricity() {
            let prevUnit = parseFloat(document.getElementById("prevUnit").value);
            let currentUnit = parseFloat(document.getElementById("currentUnit").value);
            let ftRate = parseFloat(document.getElementById("ftRate").value);
            if (currentUnit < prevUnit) {
                alert("เกิดข้อผิดพลาด! เลขมิเตอร์เดือนนี้ต้องไม่น้อยกว่าเดือนก่อนหน้า");
                return;
            }


            let usedUnit = currentUnit - prevUnit;
            let energyCost = 0;
            if (usedUnit <= 150) {
                energyCost = usedUnit * 3.25;
            } else if (usedUnit <= 400) {
                energyCost = (150 * 3.25) + ((usedUnit - 150) * 4.22);
            } else {
                energyCost = (150 * 3.25) + (250 * 4.22) + ((usedUnit - 400) * 4.42);
            }

            let ftCost = usedUnit * ftRate;
            let totalBeforeVat = energyCost + ftCost;
            let vat = totalBeforeVat * 0.07;
            let total = totalBeforeVat + vat;
            document.getElementById("resultContainer").classList.remove("hidden");
            document.getElementById("billDetails").innerHTML = `
                <div class="flex justify-between items-center py-1">
                    <span class="font-semibold">จำนวนไฟที่ใช้:</span>
                    <span class="text-lg text-blue-600 font-bold">${usedUnit} <span class="text-sm text-gray-500 font-normal">หน่วย</span></span>
                </div>
                
                <div class="bg-gray-50 p-4 rounded-lg space-y-2 border border-gray-100 my-4">
                    <div class="flex justify-between items-center">
                        <span>ค่าพลังงานไฟฟ้า:</span>
                        <span>${energyCost.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} บาท</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span>ค่า Ft (${ftRate} บาท/หน่วย):</span>
                        <span>${ftCost.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} บาท</span>
                    </div>
                    <div class="flex justify-between items-center pt-2 border-t border-gray-200 font-semibold">
                        <span>รวมเงินก่อนภาษี:</span>
                        <span>${totalBeforeVat.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} บาท</span>
                    </div>
                    <div class="flex justify-between items-center text-red-500">
                        <span>ภาษีมูลค่าเพิ่ม (VAT 7%):</span>
                        <span>${vat.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} บาท</span>
                    </div>
                </div>

                <div class="flex justify-between items-center pt-4 border-t-2 border-gray-800 text-xl">
                    <span class="font-bold text-gray-800">รวมเงินค่าไฟฟ้าทั้งสิ้น:</span>
                    <span class="font-bold text-green-600">${total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} บาท</span>
                </div>
            `;
        }
    </script>
</body>
</html>
