<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การจัดการ localStorage</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body id="pageBody" class="bg-gray-100 min-h-screen flex items-center justify-center p-4 transition-colors duration-300">

    <div class="bg-white p-8 rounded-xl shadow-md border w-full max-w-md">
        <h2 class="text-2xl font-bold text-center mb-6 text-gray-800 border-b pb-2">บันทึกข้อมูลส่วนตัว</h2>
        
        <form onsubmit="saveData(event)" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อ - นามสกุล</label>
                <input type="text" id="name" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 text-gray-900">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">อีเมล</label>
                <input type="email" id="email" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 text-gray-900">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">เบอร์โทรศัพท์</label>
                <input type="text" id="phone" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 text-gray-900">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">เลือก Theme หน้าแสดงผล</label>
                <select id="theme" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 text-gray-900">
                    <option value="light">Light Mode (สว่าง)</option>
                    <option value="dark">Dark Mode (มืด)</option>
                </select>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg mt-4 transition">
                บันทึกข้อมูล
            </button>
            
            <div class="text-center mt-4">
                <a href="lab4_1b.html" class="text-blue-500 hover:underline text-sm">ไปหน้าแสดงผล &rarr;</a>
            </div>
        </form>
    </div>

    <script>
        function saveData(event) {
            event.preventDefault(); 
            const userProfile = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                theme: document.getElementById('theme').value
            };

            localStorage.setItem('userProfile', JSON.stringify(userProfile));
            
            alert('บันทึกข้อมูลเรียบร้อยแล้ว! กรุณาไปยังหน้าแสดงผล');
            
        }
    </script>
</body>
</html>
