<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สร้างฟอร์มพร้อมตรวจสอบข้อมูล</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-md border border-gray-200 w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center border-b pb-4">สมัครสมาชิก</h2>
        
        <form onsubmit="return validateForm()" class="space-y-4">
            
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-1">ชื่อ - นามสกุล</label>
                <input type="text" id="name" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="กรอกชื่อของคุณ">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">อีเมล</label>
                <input type="text" id="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="example@email.com">
            </div>

            <div>
                <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">เบอร์โทรศัพท์</label>
                <input type="text" id="phone" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="กรอกเบอร์โทร 10 หลัก">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่าน</label>
                <input type="password" id="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="อย่างน้อย 6 ตัวอักษร">
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200 mt-4">
                ลงทะเบียน
            </button>
        </form>
    </div>

    <script>
        function validateForm() {
           
            let name = document.getElementById("name").value.trim();
            let email = document.getElementById("email").value.trim();
            let phone = document.getElementById("phone").value.trim();
            let password = document.getElementById("password").value;
            let errors = []; 

         
            if (name === "") errors.push("Please enter your name");
            if (email === "" || !email.includes("@")) errors.push("Please enter a valid email address");
            if (phone === "" || phone.length < 9 || isNaN(phone)) errors.push("Please enter a valid 10-digit phone number");
            if (password.length < 6) errors.push("Password must be at least 6 characters long");

           
            if (errors.length > 0) {
                alert(errors.join("\n"));
                return false; 
            }
                alert("Registration successful!");
                return true; 
        }
    </script>
</body>
</html>
