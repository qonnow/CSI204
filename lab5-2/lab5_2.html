<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option Dropdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen py-10 px-4 flex items-start justify-center">

    <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-md border border-gray-200">
        <h2 class="text-2xl font-bold text-gray-800 mb-2 border-b pb-4 text-center">ระบบคำนวณค่าส่งสินค้า</h2>
        
        <p class="text-sm text-green-700 font-semibold mb-6 text-center bg-green-50 border border-green-200 py-2 rounded-lg shadow-sm">
            🔥 โปรโมชั่นพิเศษ: ซื้อครบ 500 บาท ส่งฟรี!
        </p>

        <form onsubmit="event.preventDefault(); calculateShipping();" class="space-y-5">
            
            <div>
                <label for="productPrice" class="block text-sm font-medium text-gray-700 mb-1">ราคาสินค้ารวม (บาท)</label>
                <input type="number" id="productPrice" required min="1" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="เช่น 350">
            </div>

            <div>
                <label for="shippingMethod" class="block text-sm font-medium text-gray-700 mb-1">รูปแบบการจัดส่ง</label>
                <select id="shippingMethod" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white">
                    <option value="50">EMS - ด่วนพิเศษ (50 บาท)</option>
                    <option value="30">ลงทะเบียน (30 บาท)</option>
                    <option value="15">พัสดุธรรมดา (15 บาท)</option>
                </select>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md">
                คำนวณยอดสุทธิ
            </button>
        </form>

        <div id="resultContainer" class="mt-6 pt-4 border-t-2 border-gray-100 hidden">
            <h3 class="font-bold text-gray-800 mb-3">สรุปยอดชำระเงิน</h3>
            <div class="space-y-2 text-gray-700">
                <div class="flex justify-between">
                    <span>ค่าสินค้า:</span>
                    <span id="displayProductPrice">0 บาท</span>
                </div>
                <div class="flex justify-between items-center">
                    <span id="displayShippingText" class="text-orange-600">ค่าจัดส่ง:</span>
                    <span id="displayShippingCost" class="text-orange-600">0 บาท</span>
                </div>
                <div class="flex justify-between pt-3 mt-2 border-t border-gray-200 text-xl font-bold text-blue-700">
                    <span>ยอดรวมทั้งสิ้น:</span>
                    <span id="displayNetTotal">0 บาท</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        function calculateShipping() {
            let productPrice = parseFloat(document.getElementById('productPrice').value);
            let shippingSelect = document.getElementById('shippingMethod');
            let shippingCost = parseFloat(shippingSelect.value);
            let shippingName = shippingSelect.options[shippingSelect.selectedIndex].text.split(' ')[0];
            let isFreeShipping = false;
            if (productPrice >= 500) {
                shippingCost = 0; 
                isFreeShipping = true;
            }

            let netTotal = productPrice + shippingCost;
            document.getElementById('resultContainer').classList.remove('hidden');
            document.getElementById('displayProductPrice').innerText = `${productPrice.toLocaleString()} บาท`;

            if (isFreeShipping) {
                document.getElementById('displayShippingText').innerHTML = `ค่าจัดส่ง (${shippingName}): <span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded ml-2 font-bold animate-pulse">ส่งฟรี!</span>`;
                document.getElementById('displayShippingCost').innerText = `0 บาท`;
                document.getElementById('displayShippingCost').className = "font-bold text-green-600";
            } else {
                document.getElementById('displayShippingText').innerText = `ค่าจัดส่ง (${shippingName}):`;
                document.getElementById('displayShippingCost').innerText = `${shippingCost} บาท`;
                document.getElementById('displayShippingCost').className = "text-orange-600";
            }
            
            document.getElementById('displayNetTotal').innerText = `${netTotal.toLocaleString()} บาท`;
        }
    </script>
</body>
</html>
