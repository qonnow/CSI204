<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฟอร์มคำนวณค่างวดรถยนต์</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen py-10 px-4">

    <div class="max-w-4xl mx-auto space-y-6">
        
        <div class="bg-white p-8 rounded-xl shadow-md border border-gray-200">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4 text-center">คำนวณค่างวดรถยนต์</h2>
            
            <form onsubmit="event.preventDefault(); calculateCarLoan();" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="carPrice" class="block text-sm font-medium text-gray-700 mb-1">ราคารถยนต์ (บาท)</label>
                    <input type="number" id="carPrice" required min="1" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="เช่น 800000">
                </div>

                <div>
                    <label for="downPayment" class="block text-sm font-medium text-gray-700 mb-1">เงินดาวน์ (บาท)</label>
                    <input type="number" id="downPayment" required min="0" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="เช่น 200000">
                </div>

                <div>
                    <label for="interestRate" class="block text-sm font-medium text-gray-700 mb-1">อัตราดอกเบี้ย (% ต่อปี)</label>
                    <input type="number" id="interestRate" required step="0.01" min="0" value="2.50" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <p class="text-xs text-gray-500 mt-1">* ดอกเบี้ยรถยนต์ทั่วไปประมาณ 2-5%</p>
                </div>

                <div>
                    <label for="months" class="block text-sm font-medium text-gray-700 mb-1">ระยะเวลาผ่อน (เดือน)</label>
                    <select id="months" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        <option value="48">48 งวด (4 ปี)</option>
                        <option value="60" selected>60 งวด (5 ปี)</option>
                        <option value="72">72 งวด (6 ปี)</option>
                        <option value="84">84 งวด (7 ปี)</option>
                    </select>
                </div>

                <div class="md:col-span-2 mt-2">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md">
                        คำนวณค่างวด
                    </button>
                </div>
            </form>
        </div>

        <div id="resultContainer" class="bg-white p-8 rounded-xl shadow-md border border-gray-200 hidden">
            
            <div id="summaryResult" class="text-gray-700 text-lg space-y-2 mb-8 bg-blue-50 p-6 rounded-lg border border-blue-100">
                </div>

            <h4 class="text-xl font-bold text-gray-800 mb-2 border-b pb-2">ตารางผ่อนชำระแบบย่อ</h4>
            <p class="text-sm text-gray-500 mb-4">* แสดงข้อมูลทุกๆ 6 เดือน และงวดสุดท้าย</p>
            
            <div class="overflow-x-auto rounded-lg border border-gray-200 shadow-inner">
                <table class="w-full text-sm text-right text-gray-600">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                        <tr>
                            <th class="px-4 py-3 text-center">งวดที่</th>
                            <th class="px-4 py-3">ค่างวด</th>
                            <th class="px-4 py-3">เงินต้นที่ตัด</th>
                            <th class="px-4 py-3">ดอกเบี้ย</th>
                            <th class="px-4 py-3">เงินต้นคงเหลือ</th>
                        </tr>
                    </thead>
                    <tbody id="paymentTable">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        function calculateCarLoan() {
            let carPrice = parseFloat(document.getElementById("carPrice").value);
            let downPayment = parseFloat(document.getElementById("downPayment").value);
            let loanAmount = carPrice - downPayment;

            if (loanAmount <= 0) {
                alert("เงินดาวน์ต้องน้อยกว่าราคารถยนต์");
                return;
            }

            let interestRate = parseFloat(document.getElementById("interestRate").value) / 100 / 12;
            let months = parseInt(document.getElementById("months").value);
            let monthlyPayment = (loanAmount * interestRate * Math.pow(1 + interestRate, months)) / (Math.pow(1 + interestRate, months) - 1);
            if (isNaN(monthlyPayment) || !isFinite(monthlyPayment)) {
                monthlyPayment = loanAmount / months;
            }
            document.getElementById("resultContainer").classList.remove("hidden");

            let totalPaid = monthlyPayment * months;
            let totalInterest = totalPaid - loanAmount;

            document.getElementById("summaryResult").innerHTML = `
                <h3 class="text-xl font-bold text-blue-800 mb-3">สรุปสินเชื่อรถยนต์</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <p><span class="font-semibold">ราคารถ:</span> ${carPrice.toLocaleString(undefined, {minimumFractionDigits: 2})} บาท</p>
                        <p><span class="font-semibold">เงินดาวน์:</span> ${downPayment.toLocaleString(undefined, {minimumFractionDigits: 2})} บาท</p>
                        <p class="text-blue-600 font-semibold"><span class="text-gray-700">ยอดจัดสินเชื่อ (เงินกู้):</span> ${loanAmount.toLocaleString(undefined, {minimumFractionDigits: 2})} บาท</p>
                    </div>
                    <div>
                        <p class="text-2xl font-bold text-blue-600 border-b border-blue-200 pb-2 mb-2">ผ่อนงวดละ: ${monthlyPayment.toLocaleString(undefined, {minimumFractionDigits: 2})} บาท</p>
                        <p class="text-sm"><span class="font-semibold text-gray-600">ยอดรวมที่ต้องชำระ (เงินต้น+ดอกเบี้ย):</span> ${totalPaid.toLocaleString(undefined, {minimumFractionDigits: 2})} บาท</p>
                        <p class="text-sm"><span class="font-semibold text-red-500">ดอกเบี้ยรวมทั้งหมด:</span> ${totalInterest.toLocaleString(undefined, {minimumFractionDigits: 2})} บาท</p>
                    </div>
                </div>
            `;

            let tableHtml = "";
            let remaining = loanAmount;

            for (let i = 1; i <= months; i++) {
                let interest = remaining * interestRate;
                let principal = monthlyPayment - interest;

                if (i === months) {
                    principal = remaining;
                    monthlyPayment = principal + interest;
                }
                remaining -= principal;
                if (remaining < 0.01) remaining = 0;

                if (i % 6 === 0 || i === months) {
                    let rowBg = (i === months) ? "bg-green-50 font-bold" : "bg-white"; // เน้นสีงวดสุดท้าย
                    
                    tableHtml += `
                        <tr class="${rowBg} border-b hover:bg-blue-50">
                            <td class="px-4 py-2 text-center font-medium">${i}</td>
                            <td class="px-4 py-2 font-semibold text-blue-600">${monthlyPayment.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                            <td class="px-4 py-2 text-green-600">${principal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                            <td class="px-4 py-2 text-red-500">${interest.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                            <td class="px-4 py-2 font-bold">${Math.max(0, remaining).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                        </tr>
                    `;
                }
            }

            document.getElementById("paymentTable").innerHTML = tableHtml;
        }
    </script>
</body>
</html>
