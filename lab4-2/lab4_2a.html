<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การจัดการข้อมูลด้วย sessionStorage</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen py-10 px-4">

    <div class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h2 class="text-2xl font-bold text-gray-800">รายการสินค้า (Shop)</h2>
            <a href="lab4_2b.html" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow transition flex items-center gap-2">
                ดูตะกร้าสินค้า <span id="cartCount" class="bg-white text-blue-600 font-bold px-2 py-0.5 rounded-full text-xs">0</span>
            </a>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 text-center flex flex-col justify-between">
                <div>
                    <h3 class="text-lg font-bold text-gray-800 mb-2">เสื้อยืดคอกลม</h3>
                    <p class="text-gray-500 mb-4">ใส่สบาย ระบายอากาศได้ดี</p>
                </div>
                <div>
                    <p class="text-xl font-bold text-blue-600 mb-4">฿250</p>
                    <button onclick="addToCart('P01', 'เสื้อยืดคอกลม', 250)" class="w-full bg-gray-800 hover:bg-gray-900 text-white py-2 rounded-lg transition">
                        เพิ่มลงตะกร้า
                    </button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 text-center flex flex-col justify-between">
                <div>
                    <h3 class="text-lg font-bold text-gray-800 mb-2">กางเกงยีนส์</h3>
                    <p class="text-gray-500 mb-4">ทรงสวย เนื้อผ้าคุณภาพเยี่ยม</p>
                </div>
                <div>
                    <p class="text-xl font-bold text-blue-600 mb-4">฿890</p>
                    <button onclick="addToCart('P02', 'กางเกงยีนส์', 890)" class="w-full bg-gray-800 hover:bg-gray-900 text-white py-2 rounded-lg transition">
                        เพิ่มลงตะกร้า
                    </button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 text-center flex flex-col justify-between">
                <div>
                    <h3 class="text-lg font-bold text-gray-800 mb-2">หมวกแก๊ป</h3>
                    <p class="text-gray-500 mb-4">กันแดดได้ดี สไตล์มินิมอล</p>
                </div>
                <div>
                    <p class="text-xl font-bold text-blue-600 mb-4">฿150</p>
                    <button onclick="addToCart('P03', 'หมวกแก๊ป', 150)" class="w-full bg-gray-800 hover:bg-gray-900 text-white py-2 rounded-lg transition">
                        เพิ่มลงตะกร้า
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateCartCount() {
            let cart = JSON.parse(sessionStorage.getItem('shoppingCart')) || [];
            document.getElementById('cartCount').innerText = cart.length;
        }

        // ฟังก์ชันเพิ่มสินค้าลง sessionStorage
        function addToCart(id, name, price) {
            let cart = JSON.parse(sessionStorage.getItem('shoppingCart')) || [];
            cart.push({ id: id, name: name, price: price });
            sessionStorage.setItem('shoppingCart', JSON.stringify(cart));
            
            updateCartCount();
            alert(`เพิ่ม "${name}" ลงในตะกร้าเรียบร้อยแล้ว!`);
        }

     
        window.onload = updateCartCount;
    </script>
</body>
</html>
